<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 960" width="680" height="960">
  <defs>
    <radialGradient id="darkground" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1A1208"/>
      <stop offset="70%" stop-color="#0D0A05"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <radialGradient id="figurelight" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#7A3B1E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7A3B1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldtop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5A4010"/>
    </linearGradient>
    <filter id="softshadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Dark linen ground -->
  <rect width="680" height="960" fill="url(#darkground)"/>
  <!-- Linen texture suggestion -->
  <rect width="680" height="960" fill="none" stroke="#2A1F10" stroke-width="0.3" opacity="0.3"/>
  <!-- Subtle warm glow from figure zone -->
  <ellipse cx="340" cy="420" rx="200" ry="300" fill="url(#figurelight)"/>
  <!-- ═══ LIGHT PYRAMID LINES — converging to figure ═══ -->
  <g opacity="0.18" stroke="#D4B870" stroke-width="0.8">
    <!-- From top light source -->
    <line x1="340" y1="155" x2="240" y2="680"/>
    <line x1="340" y1="155" x2="440" y2="680"/>
    <line x1="340" y1="155" x2="195" y2="680"/>
    <line x1="340" y1="155" x2="485" y2="680"/>
    <line x1="340" y1="155" x2="160" y2="680"/>
    <line x1="340" y1="155" x2="520" y2="680"/>
    <!-- Horizontal cross-sections of the pyramid -->
    <line x1="260" y1="300" x2="420" y2="300" stroke-dasharray="2,6"/>
    <line x1="230" y1="400" x2="450" y2="400" stroke-dasharray="2,6"/>
    <line x1="205" y1="500" x2="475" y2="500" stroke-dasharray="2,6"/>
  </g>
  <!-- ═══ FIGURE SILHOUETTE — faint, ghosted on linen ═══ -->
  <g opacity="0.22" fill="#C4A882">
    <!-- Head -->
    <ellipse cx="340" cy="240" rx="28" ry="34"/>
    <!-- Neck -->
    <rect x="329" y="270" width="22" height="20" rx="4"/>
    <!-- Shoulders + torso -->
    <ellipse cx="340" cy="360" rx="52" ry="80"/>
    <!-- Arms - left -->
    <ellipse cx="272" cy="370" rx="16" ry="55" transform="rotate(-8,272,370)"/>
    <!-- Arms - right (slightly different - Two-Half Projection) -->
    <ellipse cx="408" cy="370" rx="16" ry="55" transform="rotate(8,408,370)"/>
    <!-- Hips -->
    <ellipse cx="340" cy="490" rx="42" ry="30"/>
    <!-- Legs -->
    <rect x="310" y="510" width="25" height="140" rx="8"/>
    <rect x="345" y="510" width="25" height="140" rx="8"/>
    <!-- Feet -->
    <ellipse cx="322" cy="655" rx="18" ry="10"/>
    <ellipse cx="358" cy="655" rx="18" ry="10"/>
  </g>
  <!-- Linen weave texture over figure zone -->
  <g opacity="0.04" stroke="#D4C4A0" stroke-width="0.4">
    <line x1="150" y1="190" x2="530" y2="190"/>
    <line x1="150" y1="200" x2="530" y2="200"/>
    <line x1="150" y1="210" x2="530" y2="210"/>
    <line x1="150" y1="220" x2="530" y2="220"/>
    <line x1="150" y1="230" x2="530" y2="230"/>
    <line x1="150" y1="240" x2="530" y2="240"/>
    <line x1="150" y1="250" x2="530" y2="250"/>
    <line x1="150" y1="260" x2="530" y2="260"/>
    <line x1="150" y1="270" x2="530" y2="270"/>
    <line x1="150" y1="280" x2="530" y2="280"/>
    <line x1="280" y1="155" x2="280" y2="720"/>
    <line x1="295" y1="155" x2="295" y2="720"/>
    <line x1="310" y1="155" x2="310" y2="720"/>
    <line x1="325" y1="155" x2="325" y2="720"/>
    <line x1="340" y1="155" x2="340" y2="720"/>
    <line x1="355" y1="155" x2="355" y2="720"/>
    <line x1="370" y1="155" x2="370" y2="720"/>
    <line x1="385" y1="155" x2="385" y2="720"/>
    <line x1="400" y1="155" x2="400" y2="720"/>
  </g>
  <!-- Tonal density marks — red-brown image marks -->
  <g opacity="0.4" fill="#7A3B1E">
    <ellipse cx="330" cy="238" rx="20" ry="24"/>
    <ellipse cx="340" cy="315" rx="35" ry="12"/>
    <ellipse cx="340" cy="355" rx="38" ry="18"/>
    <ellipse cx="340" cy="410" rx="30" ry="22"/>
    <ellipse cx="310" cy="380" rx="12" ry="30"/>
    <ellipse cx="370" cy="380" rx="12" ry="30"/>
    <ellipse cx="326" cy="570" rx="12" ry="55"/>
    <ellipse cx="354" cy="570" rx="12" ry="55"/>
  </g>
  <!-- Marginal notes — Leonardo-style italic script lines -->
  <g opacity="0.25" stroke="#C4A882" stroke-width="0.7">
    <line x1="42" y1="250" x2="152" y2="250"/>
    <line x1="42" y1="264" x2="148" y2="264"/>
    <line x1="42" y1="278" x2="155" y2="278"/>
    <line x1="42" y1="292" x2="144" y2="292"/>
    <line x1="42" y1="320" x2="150" y2="320"/>
    <line x1="42" y1="334" x2="140" y2="334"/>
    <line x1="42" y1="348" x2="152" y2="348"/>
    <line x1="42" y1="362" x2="146" y2="362"/>
    <line x1="42" y1="400" x2="148" y2="400"/>
    <line x1="42" y1="414" x2="138" y2="414"/>
    <!-- Right margin -->
    <line x1="528" y1="260" x2="638" y2="260"/>
    <line x1="528" y1="274" x2="632" y2="274"/>
    <line x1="528" y1="288" x2="636" y2="288"/>
    <line x1="528" y1="302" x2="628" y2="302"/>
  </g>
  <!-- Optical prism at base -->
  <g transform="translate(340,720)" opacity="0.45">
    <polygon points="0,-22 -19,11 19,11" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
    <!-- Light beam from prism -->
    <line x1="0" y1="11" x2="0" y2="38" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="11" x2="-18" y2="38" stroke="#8B6914" stroke-width="0.8" opacity="0.4"/>
    <line x1="6" y1="11" x2="18" y2="38" stroke="#A08040" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- ═══ GOLD TITLE BAR ═══ -->
  <rect x="0" y="0" width="680" height="148" fill="url(#goldtop)"/>
  <rect x="0" y="144" width="680" height="4" fill="#2A1808"/>
  <rect x="0" y="145" width="680" height="1" fill="#C9A84C" opacity="0.3"/>
  <text x="340" y="56" font-family="Georgia, serif" font-size="34" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="5">FIGURA</text>
  <text x="340" y="96" font-family="Georgia, serif" font-size="34" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="5">ULTIMA</text>
  <line x1="60" y1="110" x2="620" y2="110" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="340" y="130" font-family="Georgia, serif" font-size="10" font-style="italic"
        fill="#D4B870" text-anchor="middle" letter-spacing="2">Leonardo da Vinci and the Turin Shroud</text>
  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="0" y="900" width="680" height="60" fill="#0D0905" opacity="0.95"/>
  <line x1="0" y1="900" x2="680" y2="900" stroke="#8B6914" stroke-width="1"/>
  <text x="340" y="926" font-family="Georgia, serif" font-size="11"
        fill="#C9A84C" text-anchor="middle" letter-spacing="2">RICHARD STEVEN VALLANCE (DA VALENCA)</text>
  <text x="340" y="948" font-family="Georgia, serif" font-size="9"
        fill="#806030" text-anchor="middle" letter-spacing="1">The People Focused Group · Doncaster, UK · 2026</text>
  <!-- Experimental stamp -->
  <rect x="536" y="854" width="122" height="36" rx="3" fill="none" stroke="#8B3B1E" stroke-width="1.2" opacity="0.7"/>
  <text x="597" y="868" font-family="Georgia, serif" font-size="8" fill="#8B3B1E" text-anchor="middle" opacity="0.8">EXPERIMENTAL</text>
  <text x="597" y="881" font-family="Georgia, serif" font-size="7" fill="#8B3B1E" text-anchor="middle" opacity="0.7">ADVERSARIAL REVIEW</text>
</svg>